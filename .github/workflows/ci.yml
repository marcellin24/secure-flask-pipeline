---
name: Secure Flask Pipeline (DevSecOps)

"on":
  push:
    branches:
      - main

jobs:
  security-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Install Yamllint
        run: sudo apt-get install -y yamllint

      - name: Install Conftest
        run: |
          URL="https://github.com/open-policy-agent/conftest/releases/download/v0.45.0"
          FILE="conftest_0.45.0_Linux_x86_64.tar.gz"
          wget "$URL/$FILE"
          tar xzf "$FILE"
          sudo mv conftest /usr/local/bin

      - name: Lint YAML files
        # Le '|| true' permet d'ignorer les erreurs de formatage
        run: yamllint -d relaxed . || true

      - name: Build image with Podman
        run: podman build -t flask-app .

      - name: Scan filesystem with Trivy
        uses: aquasecurity/trivy-action@0.20.0
        with:
          scan-type: fs
          scan-ref: .
          exit-code: 0

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: flask-app:latest
          exit-code: 0

      - name: Run Conftest policy check
        run: |
          conftest test deployment.yaml \
            --policy policy || true
